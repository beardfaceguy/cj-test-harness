services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      # BUG-N8: database credentials hardcoded in committed config — should use env vars
      POSTGRES_USER: cjtest
      POSTGRES_PASSWORD: cjtest
      POSTGRES_DB: tasktracker
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
